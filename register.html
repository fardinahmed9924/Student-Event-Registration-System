<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Event Registration System - Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    padding-top: 54px;
  }

  /* FIXED HEADER */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 54px;
    background: #1a6ef5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 100;
  }

  header h1 {
    font-size: 1rem;
    font-weight: bold;
    color: #fff;
  }

  .theme-btn {
    background: transparent;
    border: 2px solid #fff;
    color: #fff;
    padding: 5px 14px;
    border-radius: 5px;
    font-size: 0.85rem;
    font-weight: bold;
    cursor: pointer;
  }

  /* PAGE CONTENT */
  .content {
    max-width: 720px;
    margin: 30px auto;
    padding: 0 16px;
  }

  /* FIELDSET CARD */
  fieldset {
    border: 1px solid #c8cdd6;
    border-radius: 6px;
    padding: 20px 24px 28px;
    background: #fff;
  }

  legend {
    font-size: 0.78rem;
    font-weight: bold;
    color: #1a6ef5;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 0 6px;
  }

  /* FORM ROWS */
  .row {
    display: flex;
    gap: 20px;
    margin-top: 18px;
  }

  .row.single { display: block; }

  .field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field label {
    font-size: 0.72rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #444;
  }

  .field input[type="text"],
  .field input[type="email"],
  .field input[type="password"],
  .field input[type="number"],
  .field select {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid #c8cdd6;
    border-radius: 4px;
    font-size: 0.9rem;
    color: #333;
    background: #fff;
    outline: none;
  }

  .field input:focus,
  .field select:focus {
    border-color: #1a6ef5;
    box-shadow: 0 0 0 2px rgba(26,110,245,0.15);
  }

  .field input::placeholder { color: #aaa; }

  /* FILE INPUT */
  .file-wrapper {
    border: 1px solid #c8cdd6;
    border-radius: 4px;
    padding: 7px 10px;
    font-size: 0.88rem;
    color: #555;
    background: #fff;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .file-wrapper input[type="file"] {
    font-size: 0.85rem;
    cursor: pointer;
    border: none;
    outline: none;
    background: none;
    padding: 0;
    color: #333;
    width: 100%;
  }

  /* RADIO & CHECKBOX */
  .radio-group, .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    padding: 8px 0 2px;
  }

  .radio-group label,
  .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.9rem;
    font-weight: normal;
    text-transform: none;
    letter-spacing: normal;
    color: #333;
    cursor: pointer;
  }

  input[type="radio"],
  input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: #1a6ef5;
    cursor: pointer;
    margin: 0;
  }

  /* BUTTONS */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .btn {
    padding: 9px 24px;
    border: none;
    border-radius: 5px;
    font-size: 0.9rem;
    font-weight: bold;
    cursor: pointer;
  }

  .btn-register {
    background: #1a6ef5;
    color: #fff;
  }

  .btn-register:hover { background: #155fd4; }

  .btn-reset {
    background: #6c757d;
    color: #fff;
  }

  .btn-reset:hover { background: #5a6268; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 14px;
    font-size: 0.8rem;
    color: #666;
    border-top: 1px solid #dde1ea;
    margin-top: 30px;
    background: #1a6ef5;
    color: #fff;
  }
</style>
</head>
<body>

<!-- FIXED HEADER -->
<header>
  <h1>Student Event Registration System</h1>
  <button class="theme-btn">Light / Dark</button>
</header>

<!-- REGISTER FORM -->
<div class="content">
  <fieldset>
    <legend>Student Information</legend>

    <!-- Name + Email -->
    <div class="row">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name here...">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email address">
      </div>
    </div>

    <!-- Address -->
    <div class="row">
      <div class="field">
        <label for="address">Address</label>
        <input type="text" id="address" placeholder="Enter your address">
      </div>
    </div>

    <!-- Gender + Country -->
    <div class="row">
      <div class="field">
        <label>Gender</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="Male"> Male</label>
          <label><input type="radio" name="gender" value="Female"> Female</label>
          <label><input type="radio" name="gender" value="Other"> Other</label>
        </div>
      </div>
      <div class="field">
        <label for="country">Country</label>
        <select id="country">
          <option value="">Please Select a Country</option>
          <option>India</option>
          <option>Singapore</option>
          <option>China</option>
          <option>United States</option>
          <option>United Kingdom</option>
          <option>Australia</option>
        </select>
      </div>
    </div>

    <!-- City + Age -->
    <div class="row">
      <div class="field">
        <label>City</label>
        <div class="checkbox-group">
          <label><input type="checkbox" value="Delhi"> Delhi</label>
          <label><input type="checkbox" value="Singapore"> Singapore</label>
          <label><input type="checkbox" value="Wuhan"> Wuhan (China)</label>
        </div>
      </div>
      <div class="field">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter age" min="1" max="120">
      </div>
    </div>

    <!-- Password -->
    <div class="row">
      <div class="field" style="max-width: 340px;">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password">
      </div>
    </div>

    <!-- Image -->
    <div class="row">
      <div class="field">
        <label for="image">Image</label>
        <div class="file-wrapper">
          <input type="file" id="image" accept="image/*">
        </div>
      </div>
    </div>

  </fieldset>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-register" onclick="registerStudent()">Register</button>
    <button class="btn btn-reset" onclick="resetForm()">Reset</button>
  </div>
</div>

<footer>© 2026 Student Event Registration System. All rights reserved.</footer>

<script>
  function registerStudent() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    if (!name || !email) { alert('Please fill in at least Name and Email.'); return; }
    alert('Student registered successfully!');
  }

  function resetForm() {
    document.querySelectorAll('input[type="text"], input[type="email"], input[type="password"], input[type="number"], input[type="file"]')
      .forEach(i => i.value = '');
    document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(i => i.checked = false);
    document.getElementById('country').selectedIndex = 0;
  }
</script>
</body>
</html>
