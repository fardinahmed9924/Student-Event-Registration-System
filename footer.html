<!DOCTYPE html>
<html>
<head>
<title>View Events</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
margin:0;
display:flex;
flex-direction:column;
min-height:100vh;
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#007bff;
color:white;
}

button{
padding:6px 12px;
background:#28a745;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#218838;
}

input{
padding:6px;
margin-top:10px;
}

/* FOOTER */
footer{
background:#007bff;
color:white;
text-align:center;
padding:12px;
margin-top:auto;
font-size:14px;
}
</style>

</head>
<body>

<h2>Available Events</h2>

Enter Your Name:
<input type="text" id="studentName" placeholder="Your Name">

<table>
<thead>
<tr>
<th>Event Title</th>
<th>Date</th>
<th>Venue</th>
<th>Action</th>
</tr>
</thead>

<tbody id="eventTable">
</tbody>
</table>

<script>

// Load events
function loadEvents(){
fetch("get_events.php")
.then(response => response.json())
.then(data => {

let rows = "";

data.forEach(event => {

rows += `
<tr>
<td>${event.title}</td>
<td>${event.event_date}</td>
<td>${event.venue}</td>
<td>
<button onclick="joinEvent(${event.event_id})">
Join
</button>
</td>
</tr>
`;

});

document.getElementById("eventTable").innerHTML = rows;

});
}

// Join event
function joinEvent(id){

let name = document.getElementById("studentName").value;

if(name === ""){
alert("Please enter your name");
return;
}

let formData = new FormData();
formData.append("event_id", id);
formData.append("student_name", name);

fetch("join_event.php",{
method:"POST",
body:formData
})
.then(response => response.text())
.then(message => {
alert(message);
});

}

// Load events
loadEvents();

</script>

<footer>
© 2026 Student Event Registration System. All rights reserved.
</footer>

</body>
</html>
