<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard - Events</title>
<meta name="viewport" content="width=device-width">

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
background:#007bff;
color:white;
padding:12px;
}

.container{
padding:20px;
flex:1;
}

input, button{
padding:8px;
margin:5px;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th, td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#007bff;
color:white;
}

/* FOOTER */
footer{
background:#007bff;
color:white;
text-align:center;
padding:12px;
margin-top:auto;
font-size:14px;
}
</style>
</head>

<body>

<header>
<h2>Admin Dashboard - Event Management</h2>
</header>

<div class="container">

<h3>Add Event</h3>

<input type="text" id="eventName" placeholder="Event Name">
<input type="date" id="eventDate">
<input type="text" id="eventVenue" placeholder="Venue">

<br>
<button onclick="addEvent()">Add Event</button>

<h3>All Events</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Date</th>
<th>Venue</th>
</tr>
</thead>
<tbody id="eventTable"></tbody>
</table>

</div>

<footer>
© 2026 Student Event Registration System. All rights reserved.
</footer>

<script>

/* ADD EVENT */
function addEvent(){
    let f = new FormData();
    f.append("action", "add");
    f.append("title", document.getElementById("eventName").value);
    f.append("date", document.getElementById("eventDate").value);
    f.append("venue", document.getElementById("eventVenue").value);

    fetch("event_api.php", {
        method: "POST",
        body: f
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadEvents();
    });
}

/* LOAD EVENTS */
function loadEvents(){
    let f = new FormData();
    f.append("action", "list");

    fetch("event_api.php", {
        method: "POST",
        body: f
    })
    .then(res => res.json())
    .then(data => {
        let rows = "";
        data.forEach(e => {
            rows += `<tr>
                <td>${e.event_id}</td>
                <td>${e.title}</td>
                <td>${e.event_date}</td>
                <td>${e.venue}</td>
            </tr>`;
        });
        document.getElementById("eventTable").innerHTML = rows;
    });
}

/* LOAD EVENTS ON PAGE LOAD */
loadEvents();

</script>

</body>
</html>
